# H2 Database for Testing
spring.datasource.url=jdbc:h2:mem:upimesh;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for unit tests to let Hibernate manage schema
spring.flyway.enabled=false

# Redis host mapping (will fail over to H2 database idempotency records)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator exposure
management.endpoints.web.exposure.include=health,info,prometheus

# Telemetry TTLs
upi.mesh.idempotency-ttl-seconds=86400
upi.mesh.packet-max-age-seconds=86400

# Server
server.port=8080

# PostgreSQL Production Database
spring.datasource.url=jdbc:postgresql://localhost:5432/upimesh
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migrations Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Redis distributed caching
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator Metrics and Prometheus endpoint exposure
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Logging Pattern
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window (how long a packet hash is remembered in seconds)
upi.mesh.idempotency-ttl-seconds=86400

# Packet freshness window — anything older than this is rejected as replay in seconds
upi.mesh.packet-max-age-seconds=86400
